webdriver {
  driver = chrome
  autodownload = true
  base.url = "https://www.saucedemo.com"
}

headless.mode = false

chrome.switches = "--start-maximized;--no-sandbox;--disable-dev-shm-usage;--disable-infobars"

serenity {
  project.name = "NTT Data E2E Test"
  restart.browser.for.each = scenario
  take.screenshots = AFTER_EACH_STEP
}
